<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" fill="none">
  <rect width="600" height="400" rx="12" fill="#1a1e24"/>
  <!-- Terminal header -->
  <rect width="600" height="36" rx="12" fill="#161b22"/>
  <rect x="600" y="12" width="600" height="24" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="18" r="6" fill="#febc2e"/>
  <circle cx="56" cy="18" r="6" fill="#28c840"/>
  <text x="300" y="22" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">vz sales.csv</text>
  <!-- Chart area -->
  <text x="20" y="60" font-family="monospace" font-size="11" fill="#8b949e">Line │ x=date │ y=revenue ▂▅▃▁█▇ │ ↑ +80%</text>
  <!-- Y axis -->
  <text x="20" y="90" font-family="monospace" font-size="10" fill="#8b949e">2.0k│</text>
  <text x="20" y="180" font-family="monospace" font-size="10" fill="#8b949e">1.5k│</text>
  <text x="20" y="270" font-family="monospace" font-size="10" fill="#8b949e">1.0k│</text>
  <text x="20" y="340" font-family="monospace" font-size="10" fill="#8b949e"> 500│</text>
  <!-- Line chart (cyan) -->
  <polyline points="80,270 160,180 240,220 320,290 400,90 480,120" stroke="#79c0ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line chart (yellow) -->
  <polyline points="80,250 160,200 240,210 320,230 400,160 480,170" stroke="#e3b341" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,3"/>
  <!-- Data point -->
  <circle cx="320" cy="310" r="4" fill="#7ee787"/>
  <!-- X axis -->
  <line x1="60" y1="350" x2="560" y2="350" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="370" font-family="monospace" font-size="9" fill="#8b949e">2024-01</text>
  <text x="200" y="370" font-family="monospace" font-size="9" fill="#8b949e">2024-03</text>
  <text x="360" y="370" font-family="monospace" font-size="9" fill="#8b949e">2024-05</text>
  <text x="480" y="370" font-family="monospace" font-size="9" fill="#8b949e">2024-06</text>
  <!-- Legend -->
  <rect x="480" y="80" width="100" height="60" rx="4" fill="#161b22" stroke="#30363d"/>
  <line x1="490" y1="98" x2="510" y2="98" stroke="#79c0ff" stroke-width="2"/>
  <text x="515" y="102" font-family="monospace" font-size="10" fill="#79c0ff">Tokyo</text>
  <line x1="490" y1="118" x2="510" y2="118" stroke="#e3b341" stroke-width="2"/>
  <text x="515" y="122" font-family="monospace" font-size="10" fill="#e3b341">Osaka</text>
  <circle cx="500" cy="133" r="3" fill="#7ee787"/>
  <text x="515" y="137" font-family="monospace" font-size="10" fill="#7ee787">Nagoya</text>
</svg>
